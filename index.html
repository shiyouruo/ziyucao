  #splash.hide { opacity: 0; pointer-events: none; }
  #splash::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.18);
  }

  .splash-title {
    font-family: 'STLiti', 'LiSu', 'FangSong', serif;
    font-size: clamp(4rem, 12vw, 8rem);
    font-weight: 700;
    color: #3b1a06;
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    position: relative; z-index: 1;
    text-shadow: 2px 2px 12px rgba(255,255,255,0.6);
    margin-bottom: 0.15em;
  }
  .splash-sub {
    font-size: clamp(0.85rem, 2vw, 1.05rem);
    color: #5a3010; letter-spacing: 0.55em; text-indent: 0.55em;
    position: relative; z-index: 1;
    margin-bottom: 3rem; opacity: 0.75;
  }
  .divider-ornament {
    position: relative; z-index: 1;
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 2rem; color: #7a4a20; opacity: 0.6;
  }
  .divider-ornament::before, .divider-ornament::after {
    content: ''; width: 70px; height: 1px;
    background: linear-gradient(90deg, transparent, #7a4a20, transparent);
  }
  .password-wrap {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 0.8rem;
  }
  .password-label { font-size: 0.85rem; color: #5a3010; letter-spacing: 0.35em; opacity: 0.8; }
  #pwd-input {
    background: rgba(255,255,255,0.55);
    border: 1px solid rgba(90,45,12,0.35); border-radius: 2px;
    color: #3b1a06; font-family: inherit; font-size: 1.3rem;
    letter-spacing: 0.5em; padding: 0.6rem 1.4rem;
    width: 150px; text-align: center; outline: none; transition: border-color 0.3s, background 0.3s;
  }
  #pwd-input:focus { border-color: #7a4a20; background: rgba(255,255,255,0.75); }
  #pwd-input::placeholder { opacity: 0.35; }
  #pwd-error { color: #a03010; font-size: 0.82rem; letter-spacing: 0.2em; min-height: 1.2em; }

  /* ── MAIN ── */
  #main { display: none; min-height: 100vh; }
  #main.show { display: block; }

  .site-header {
    background: var(--ink); padding: 2rem 0 0;
    text-align: center; border-bottom: 2px solid var(--gold);
    position: sticky; top: 0; z-index: 50;
  }
  .site-title {
    font-family: 'STLiti', 'LiSu', 'FangSong', serif;
    font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 700;
    color: var(--gold-lt); letter-spacing: 0.5em; text-indent: 0.5em;
    text-shadow: 0 1px 8px rgba(181,137,74,0.4); margin-bottom: 1.5rem;
  }

  /* ── NAV ── */
  nav { display: flex; justify-content: center; border-top: 1px solid rgba(181,137,74,0.2); }
  nav .nav-item { position: relative; }
  nav button {
    background: transparent; border: none;
    color: rgba(212,170,106,0.7); font-family: inherit;
    font-size: clamp(0.85rem, 2vw, 1rem); letter-spacing: 0.25em;
    padding: 0.9rem clamp(1rem, 3vw, 2.5rem);
    cursor: pointer; position: relative; transition: color 0.3s;
    display: block; width: 100%;
  }
  nav button::after {
    content: ''; position: absolute;
    bottom: 0; left: 20%; right: 20%; height: 2px;
    background: var(--gold); transform: scaleX(0); transition: transform 0.3s;
  }
  nav button:hover, nav button.active { color: var(--gold-lt); }
  nav button.active::after, nav button:hover::after { transform: scaleX(1); }

  /* ── POEM DROPDOWN ── */
  .poem-dropdown {
    display: none;
    position: absolute; top: 100%; left: 0;
    min-width: 220px; max-height: 320px;
    overflow-y: auto;
    background: #221508;
    border: 1px solid rgba(181,137,74,0.35);
    border-top: none;
    z-index: 200;
    box-shadow: 4px 8px 24px rgba(0,0,0,0.5);
  }
  .poem-dropdown.open { display: block; }
  .poem-dropdown::-webkit-scrollbar { width: 4px; }
  .poem-dropdown::-webkit-scrollbar-thumb { background: rgba(181,137,74,0.3); border-radius: 2px; }
  .poem-dropdown a {
    display: block; padding: 0.65rem 1.2rem;
    color: rgba(212,170,106,0.75); font-size: 0.88rem;
    letter-spacing: 0.1em; text-decoration: none;
    border-bottom: 1px solid rgba(181,137,74,0.1);
    transition: background 0.2s, color 0.2s;
    cursor: pointer;
  }
  .poem-dropdown a:hover { background: rgba(181,137,74,0.15); color: var(--gold-lt); }

  /* ── nested submenu for 序 ── */
  .yl-sub-wrap { position: relative; }
  .yl-sub-trigger {
    display: block; padding: 0.65rem 1.2rem;
    color: rgba(212,170,106,0.75); font-size: 0.88rem;
    letter-spacing: 0.1em; text-decoration: none;
    border-bottom: 1px solid rgba(181,137,74,0.1);
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .yl-sub-trigger:hover { background: rgba(181,137,74,0.15); color: var(--gold-lt); }
  .yl-submenu {
    display: none;
    position: fixed;
    min-width: 160px;
    background: #1a0f05;
    border: 1px solid rgba(181,137,74,0.35);
    box-shadow: 4px 8px 24px rgba(0,0,0,0.5);
    z-index: 250;
  }
  .yl-submenu.open { display: block; }
  .yl-submenu a {
    display: block; padding: 0.65rem 1.2rem;
    color: rgba(212,170,106,0.75); font-size: 0.85rem;
    letter-spacing: 0.1em; cursor: pointer;
    border-bottom: 1px solid rgba(181,137,74,0.1);
    transition: background 0.2s, color 0.2s;
  }
  .yl-submenu a:hover { background: rgba(181,137,74,0.15); color: var(--gold-lt); }

  /* ── article display (序/跋/音韵说明) ── */
  .article-card {
    background: var(--silk);
    border: 1px solid var(--silk-dk);
    border-left: 3px solid var(--gold);
    padding: 2rem 2.2rem;
    border-radius: 0 2px 2px 0;
  }
  .article-title {
    font-size: 1.2rem; font-weight: 600;
    color: var(--ink-soft); letter-spacing: 0.3em;
    text-align: center; margin-bottom: 1.5rem;
  }
  .article-body {
    font-size: 0.98rem; line-height: 2.3;
    color: var(--ink); text-align: justify; text-indent: 2em;
  }
  .article-sign {
    text-align: right; margin-top: 1.5rem;
    font-size: 0.9rem; color: var(--ink-soft); letter-spacing: 0.1em;
  }
  .article-note {
    margin-top: 1.2rem; font-size: 0.82rem;
    color: #7a6040; font-style: italic; line-height: 1.8;
    border-top: 1px solid var(--silk-dk); padding-top: 0.7rem;
    text-indent: 0;
  }
  .wanlian-placeholder {
    text-align: center; color: #9e8860;
    padding: 3rem 1rem; font-size: 0.95rem; letter-spacing: 0.1em;
  }

  /* ── CONTENT ── */
  .content { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-heading { text-align: center; margin-bottom: 2.5rem; }
  .section-heading h2 {
    font-size: 1.5rem; font-weight: 600;
    color: var(--ink-soft); letter-spacing: 0.4em; margin-bottom: 0.5rem;
  }
  .section-heading .rule {
    display: flex; align-items: center; gap: 0.75rem;
    justify-content: center; color: var(--gold); font-size: 0.75rem;
  }
  .section-heading .rule::before, .section-heading .rule::after {
    content: ''; width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .poem-card {
    background: var(--silk); border: 1px solid var(--silk-dk);
    border-left: 3px solid var(--gold);
    padding: 1.8rem 2rem; margin-bottom: 1.5rem;
    border-radius: 0 2px 2px 0; transition: box-shadow 0.3s;
  }
  .poem-card:hover { box-shadow: 4px 4px 16px rgba(181,137,74,0.1); }
  .poem-title {
    font-size: 1.1rem; font-weight: 600;
    color: var(--ink-soft); letter-spacing: 0.2em; margin-bottom: 1rem;
  }
  .poem-subtitle {
    font-size: 0.82rem;
    color: #7a6040;
    line-height: 1.8;
    margin-bottom: 0.8rem;
    font-style: italic;
  }
  .poem-body { font-size: 1rem; line-height: 2.5; color: var(--ink); }
  .poem-body p { margin: 0; }

  /* annotated word */
  .ann {
    color: #1a5cb5;
    text-decoration: underline;
    text-decoration-color: #1a5cb5;
    text-underline-offset: 3px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .ann:hover { color: #0e3d82; }

  /* ── POPUP ── */
  #popup-overlay {
    display: none; position: fixed; inset: 0;
    z-index: 300; background: rgba(0,0,0,0.25);
  }
  #popup-overlay.show { display: block; }
  #popup-box {
    position: absolute;
    background: var(--silk);
    border: 1px solid var(--silk-dk);
    border-top: 3px solid var(--gold);
    border-radius: 2px;
    padding: 1.2rem 1.5rem;
    max-width: 300px; min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    font-size: 0.92rem; line-height: 1.9;
    color: var(--ink-soft);
  }
  #popup-box .popup-word {
    font-size: 1.1rem; font-weight: 700;
    color: #1a5cb5; margin-bottom: 0.4rem; letter-spacing: 0.1em;
  }
  #popup-close {
    position: absolute; top: 0.5rem; right: 0.7rem;
    background: none; border: none; cursor: pointer;

<script>
// ── 密码 ──
const CORRECT = '2606';

      const splash = document.getElementById('splash');

// ── 诗库 ──
const poems = [
  {
    title: '宿尤兄舍抵足话旧',
    lines: [
      { text: '廿年前迹话酸辛，' },
      { text: '浩瀚大千一点尘。', ann: [{ word: '大千', note: '佛经语，即"三千大千世界"，形容宇宙之广大无边。' }] },
      { text: '得失无关当世事，' },
      { text: '戚休唯有眼前人。', ann: [{ word: '戚休', note: '悲欢，指人生的悲伤与喜悦。' }] },
    ]
  },
  {
    title: '调尤兄',
    subtitle: '（尤兄与嫂隔江而居，唯假日渡江相会。值周末，因作小诗调之。）',
    subtitleAnn: [
      { word: '值', note: '逢，碰到。' },
      { word: '调之', note: '取笑他，同他开玩笑。' },
    ],
    lines: [
      { text: '粉李朱桃尽著花，', ann: [{ word: '粉李朱桃', note: '白色李花、红色桃花，泛指春日繁花。' }] },
      { text: '东风袅袅透窗纱。' },
      { text: '弥漫烟水长江渡，' },
      { text: '应有渔人泛客槎。', ann: [{ word: '槎', note: '音叉，用竹或木编成的航行之物，即筏，借指船。' }] },
    ]
  }
]

// Store annotations globally so onclick can reference by index
const annData = {};

function renderPoem(idx) {
  const p = poems[idx];
  // Build subtitle HTML if present
  let subtitleHtml = '';
  if (p.subtitle) {
    let st = p.subtitle;
    if (p.subtitleAnn) {
      p.subtitleAnn.forEach((a, ai) => {
        const key = `sub_${idx}_${ai}`;
        annData[key] = { word: a.word, note: a.note };
        st = st.replace(a.word,
          `<span class="ann" onclick="showPopupByKey(event,'${key}')">${a.word}</span>`);
      });
    }
    subtitleHtml = `<div class="poem-subtitle">${st}</div>`;
  }
  let html = `<div class="poem-card">
    <div class="poem-title">${p.title}</div>
    ${subtitleHtml}
    <div class="poem-body">`;
  p.lines.forEach((line, li) => {
    let lineHtml = line.text;
    if (line.ann) {
      line.ann.forEach((a, ai) => {
        const key = `${idx}_${li}_${ai}`;
        annData[key] = { word: a.word, note: a.note };
        lineHtml = lineHtml.replace(
          a.word,
          `<span class="ann" onclick="showPopupByKey(event,'${key}')">${a.word}</span>`
        );
      });
    }
    html += `<p>${lineHtml}</p>`;
  });
  html += `</div></div>`;
  document.getElementById('poem-display').innerHTML = html;
}

function showPopupByKey(e, key) {
  const a = annData[key];
  if (!a) return;
  showPopup(e, a.word, a.note);
}

function showPoem(idx) {
  // 显示诗页
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-shi').classList.add('active');
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-shi-btn').classList.add('active');
  // 关闭下拉
  document.getElementById('poem-menu').classList.remove('open');
  renderPoem(idx);
}

// ── 序跋音韵挽联 数据 ──
const ylArticles = {
  'xu-yu': {
    title: '俞序',
    body: `儒林俗薄，自古而然。左营右钻，内争外轧，名利是竞耳。然则果有薄名鄙利君子耶，曰：史兆伸君是焉。史君浙之四明人，早年以革命北走江浦，历四十余寒暑。今且两袖清风，白发有种，颓乎老矣。而生平于谋生之余，耽心吟咏，以诗自适。昔韩昌黎以为，物不得其平则鸣，而史君以鸣得祸。乃知鸣于言不若鸣于诗，既鸣于诗矣，久之而悟，诗者自娱之，具非鸣之物也。孟东野以诗鸣，故其声苦，人生几何，徒苦何为。故史君虽穷饿其身，思愁其心肠，终不为不幸而作寒蛩之鸣。其诗也淡泊如寒村小景，疏宕如秋林霜叶。吾初方之陶潜，而陶潜意在无怀葛天之民。而史君则植根当世，不存遐想，浸淫乎方城，混迹乎黑白。濯江流、挹山云、振清风、照明月，比之陶潜脚踏实地多矣。是则史君之诗不以名存，不以利作，不鸣而鸣矣。诚文苑之清品，吟坛之逸调也。吾与史君论交于大患难间，凡三十余载，共乎一舟，死生不渝其情。每读其诗，或为之嘻笑，或为之涕泣，灵犀一点互通方寸。吾不知史君，天下无人知史君矣。爰为序。`,

    body: `近几十年来，传统诗词曾经被一些人视为陈旧的束缚人们思想的一种文艺形式而打入冷宫。自从改革开放以来，这一传统的文艺瑰宝才被人们重新认识、才得到平反、才开始了艰难的复苏。于是全国各地诗词组织相继兴起，江城诗社是率先组织起来的在全国当时为数尚不多的地方诗词组织之一。1987年7月在江城诗社的成立大会上，史兆伸先生以年高学博众望所归当选为诗社副社长之一。史老浙江宁波人，年少即失怙恃，家境贫寒，潜心自学，涉猎经史研心诗词。其诗清微远淡，深得王孟韦柳神髓，自然真朴处颇具彭泽遗韵。惟随作随弃，不自珍惜。诗社同仁多次吁请史老整理旧作，编订成书以广交流。而史老翻检箧笥已十不存一，并题之曰《自娱草》。当代诗词学家、诗词评论家周笃文先生说：放眼时下诗坛，我觉得有些问题值得注意。比如我觉得活跃有余而深刻不足，附庸风雅与宣传说教之什有余而骨力坚苍妙思横溢之作不足。我们可以网取生活的诗意，不拘一格地加以表现。无论是润色鸿业的壮声英概、针砭时弊的匕首投枪、乃至人生旅途的困顿枨触以及酒边花下的浅斟低唱，凡是能抒性灵、具高格、谐声律于唇吻、寄妙思于物象者都是好诗，都有存在流传与发展的权利(摘自中华诗词协会1991年14期）。通读史老所作，清纯精炼、冲干穆雅淡，在深厚的传统功才的基础上另辟蹊径，自然灵活脱尽俗气，形成自家风格。非历经险阻德高品重者不能为，非细心品尝者不能得其要领，与一般附会风雅之什不可相提并论也。江城诗社同仁为准备纪念诗社成立10周年，特编印史老《自娱草》以广交流，我亦借此机会表示祝贺。史老年逾古稀而犹步履稳健体气安详，诗词创作之成就尚未可限量。寄语史老今后诗稿尤宜加意收存，慎勿再随手丢弃也。`,

       <div class="wanlian-placeholder">此处将显示挽联文字或照片，请提供内容。</div></div>`;
    document.getElementById('yl-heading').textContent = '挽联';
    return;
  }
  const a = ylArticles[key];
  if (!a) return;
  document.getElementById('yl-heading').textContent = a.title;

  let body = a.body;
  if (a.noteAnn) {
    a.noteAnn.forEach((ann, ai) => {
      const k = `yl_${key}_${ai}`;
      annData[k] = { word: ann.word, note: ann.note };
      body = body.replace(ann.word, `<span class="ann" onclick="showPopupByKey(event,'${k}')">${ann.word}</span>`);
    });
  }

  let html = `<div class="article-card">
    <div class="article-title">${a.title}</div>
    <div class="article-body">${body}</div>`;
  if (a.sign) html += `<div class="article-sign">${a.sign}</div>`;
  html += `</div>`;
  document.getElementById('yl-display').innerHTML = html;
}

// ── 离线生僻字词典 ──
// 可随时在此添加更多字词条目
const charDict = {
  '曦': { pinyin: 'xī', meaning: '日光，阳光。多用于人名或诗文中形容晨光、朝阳。', example: '如：晨曦、曦光。' },
  '蛩': { pinyin: 'qióng', meaning: '蟋蟀的别称。古诗文中常借蟋蟀之鸣写秋夜的寂寥与思绪。', example: '如：寒蛩（秋夜的蟋蟀）。' },
  '槎': { pinyin: 'chá', meaning: '用竹或木编成的筏子，借指小船。', example: '如：泛客槎（乘船漂泊）。' },
  '雏': { pinyin: 'chú', meaning: '幼小的鸟，引申指年幼的孩子。', example: '如：将雏（带着孩子）。' },
  '怙': { pinyin: 'hù', meaning: '依靠，凭借。"失怙"指年幼丧父。', example: '如：失怙恃（幼年失去父母）。' },
  '恃': { pinyin: 'shì', meaning: '依靠，依赖。常与"怙"连用指代父母。', example: '如：失怙恃。' },
  '箧': { pinyin: 'qiè', meaning: '小箱子，用来收藏物品或文稿。', example: '如：箧笥（藏书或文稿的箱子）。' },
  '笥': { pinyin: 'sì', meaning: '盛饭食或衣物的方形竹器，亦指书箱。', example: '如：箧笥。' },
};

function lookupChar() {
  const ch = document.getElementById('char-input').value.trim();
  const box = document.getElementById('char-result');
  if (!ch) { box.innerHTML = '请先输入要查询的汉字。'; return; }

  const chars = [...ch];
  const found = chars.filter(c => charDict[c]);
  const notFound = chars.filter(c => !charDict[c]);

  let html = '';
  found.forEach(c => {
    const d = charDict[c];
    html += `<div style="margin-bottom:1rem;">
      <span class="char-big">${c}</span>
      <div style="overflow:hidden;line-height:2;">
        <strong>拼音：</strong>${d.pinyin}<br>
        <strong>释义：</strong>${d.meaning}<br>
        ${d.example ? `<strong>用例：</strong>${d.example}` : ''}
      </div>
      <div style="clear:both;"></div>
    </div>`;
  });

  if (notFound.length === 0) {
    box.innerHTML = html;
    return;
  }

  // Show offline results immediately, then try online lookup for the rest
  box.innerHTML = html + `<div id="online-lookup-area"><div class="loading">「${notFound.join('')}」词典未收录，正在尝试联网查询…</div></div>`;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6', max_tokens: 1000,
      messages: [{ role: 'user', content: `请解释汉字"${notFound.join('、')}"的读音（拼音）、字义，以及在古典诗词中的用法举例。每字简洁说明，不超过150字。` }]
    })
  })
  .then(res => res.json())
  .then(data => {
    const text = data.content?.map(i => i.text||'').join('') || '未能获取释义。';
    const area = document.getElementById('online-lookup-area');
    if (area) area.innerHTML = `<div style="line-height:2;">${text.replace(/\n/g,'<br>')}</div>`;
  })
  .catch(() => {
    const area = document.getElementById('online-lookup-area');
    if (area) area.innerHTML = `<div style="color:#a03010;line-height:1.8;">「${notFound.join('')}」词典未收录，且联网查询失败（本地打开网页文件时无法联网；网站部署上线后此功能即可正常使用）。</div>`;
  });
}

// ── 站内诗词搜索 ──
function searchPoems() {
  const q = document.getElementById('poem-search-input').value.trim();
  const box = document.getElementById('poem-search-result');
  if (!q) { box.innerHTML = '请输入关键词。'; return; }
  const all = [...poems, ...ciList];
  const hits = all.filter(p => p.title.includes(q) || p.lines.some(l => l.text.includes(q)));
  if (hits.length === 0) { box.innerHTML = `未找到含「${q}」的诗句。`; return; }
  box.innerHTML = hits.map(p => `
    <div class="poem-card" style="margin-bottom:1rem;">
      <div class="poem-title">${p.title}</div>
      <div class="poem-body">${p.lines.map(l => `<p>${l.text.replace(q,`<mark style="background:#f0d98a;padding:0 2px;">${q}</mark>`)}</p>`).join('')}</div>
    </div>`).join('');
}
document.getElementById('char-input').addEventListener('keydown', e => { if(e.key==='Enter') lookupChar(); });
document.getElementById('poem-search-input').addEventListener('keydown', e => { if(e.key==='Enter') searchPoems(); });
